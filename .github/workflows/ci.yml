name: CI

on:
  push:
    branches: [ dev, 'week*', 'hotfix/*' ]
  pull_request:
    branches: [ main, dev ]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: dlqrevive_test
          POSTGRES_USER: dlqrevive
          POSTGRES_PASSWORD: dlqrevive
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run backend tests
        working-directory: backend
        run: mvn test --no-transfer-progress
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/dlqrevive_test
          SPRING_DATASOURCE_USERNAME: dlqrevive
          SPRING_DATASOURCE_PASSWORD: dlqrevive

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: backend/target/surefire-reports/
          retention-days: 7
