name: CI

on:
  push:
    branches: [ dev, 'week*', 'week*/**', 'hotfix/*' ]
  pull_request:
    branches: [ main, dev ]

jobs:
  # ===================================================================
  # JOB 1: Build & Test (Unit + Integration Tests)
  # ===================================================================
  # Catches: Logic bugs, NPEs, broken transformations, API contract
  #          violations, Kafka consumer lifecycle issues, audit gaps
  # ===================================================================
  test:
    name: Build & Test (Java 17)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: dlqrevive_test
          POSTGRES_USER: dlqrevive
          POSTGRES_PASSWORD: dlqrevive
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run all backend tests
        working-directory: backend
        run: mvn test --no-transfer-progress
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/dlqrevive_test
          SPRING_DATASOURCE_USERNAME: dlqrevive
          SPRING_DATASOURCE_PASSWORD: dlqrevive

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: backend/target/surefire-reports/
          retention-days: 7

  # ===================================================================
  # JOB 2: Docker Infrastructure Validation
  # ===================================================================
  # Catches: "Works on my machine" failures, Kafka listener misconfig,
  #          schema.sql not loaded, Kafka/Zookeeper startup order bugs,
  #          container health check failures, network connectivity issues
  # ===================================================================
  docker-infra:
    name: Docker Infrastructure Validation
    runs-on: ubuntu-latest
    needs: test  # Only run if unit tests pass first

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate docker-compose syntax
        run: docker compose -f docker/docker-compose.yml config --quiet

      - name: Start infrastructure & wait for healthy
        run: |
          docker compose -f docker/docker-compose.yml up -d
          echo "Waiting for all services to become healthy..."
          # Wait up to 90 seconds for all containers to be healthy
          timeout=90
          elapsed=0
          while [ $elapsed -lt $timeout ]; do
            all_healthy=true
            for container in dlq-kafka dlq-postgres dlq-zookeeper; do
              status=$(docker inspect --format='{{.State.Health.Status}}' $container 2>/dev/null || echo "not-found")
              if [ "$status" != "healthy" ]; then
                all_healthy=false
                break
              fi
            done
            if $all_healthy; then
              echo "✅ All containers healthy after ${elapsed}s"
              break
            fi
            sleep 5
            elapsed=$((elapsed + 5))
          done
          if ! $all_healthy; then
            echo "❌ TIMEOUT: Not all containers healthy after ${timeout}s"
            docker ps -a
            docker logs dlq-kafka 2>&1 | tail -30 || true
            docker logs dlq-zookeeper 2>&1 | tail -30 || true
            docker logs dlq-postgres 2>&1 | tail -30 || true
            exit 1
          fi

      - name: Verify all containers are healthy
        run: |
          echo "--- Container Health Status ---"
          for container in dlq-kafka dlq-postgres dlq-zookeeper; do
            status=$(docker inspect --format='{{.State.Health.Status}}' $container)
            echo "$container: $status"
            if [ "$status" != "healthy" ]; then
              echo "❌ FAILED: $container is $status, expected healthy"
              docker logs $container 2>&1 | tail -20
              exit 1
            fi
          done
          echo "✅ All containers healthy"

      - name: Test Kafka EXTERNAL listener (localhost:9092)
        run: |
          # This is the listener used by the backend running OUTSIDE Docker (local dev)
          docker exec dlq-kafka kafka-broker-api-versions \
            --bootstrap-server localhost:9092 2>&1 | head -5
          echo "✅ Kafka external listener (localhost:9092) reachable"

      - name: Test Kafka INTERNAL listener (kafka:29092)
        run: |
          # This is the listener used by the backend running INSIDE Docker
          # Blueprint v2: "INTERNAL (kafka:29092) — Used by other containers on the Docker network"
          docker exec dlq-kafka kafka-broker-api-versions \
            --bootstrap-server kafka:29092 2>&1 | head -5
          echo "✅ Kafka internal listener (kafka:29092) reachable"

      - name: Test topic creation
        run: |
          docker exec dlq-kafka kafka-topics --create \
            --topic ci-test-dlq \
            --partitions 3 \
            --replication-factor 1 \
            --bootstrap-server localhost:9092
          echo "✅ Topic ci-test-dlq created successfully"

      - name: End-to-end produce and consume
        run: |
          # Produce a test message
          echo '{"orderId":"CI-1","amount":100,"status":"FAILED","error":"Schema mismatch v2"}' | \
            docker exec -i dlq-kafka kafka-console-producer \
              --topic ci-test-dlq \
              --bootstrap-server localhost:9092

          # Consume it back — timeout after 10 seconds
          result=$(docker exec dlq-kafka kafka-console-consumer \
            --topic ci-test-dlq \
            --from-beginning \
            --max-messages 1 \
            --bootstrap-server localhost:9092 \
            --timeout-ms 15000 2>/dev/null)

          if echo "$result" | grep -q "CI-1"; then
            echo "✅ End-to-end produce/consume works"
          else
            echo "❌ FAILED: Could not consume the produced message"
            echo "Received: $result"
            exit 1
          fi

      - name: Verify PostgreSQL schema was loaded
        run: |
          # schema.sql is mounted via docker-entrypoint-initdb.d in docker-compose.yml
          # If this fails, every INSERT into redrive_log/audit_trail fails → silent data loss
          tables=$(docker exec dlq-postgres psql -U dlqrevive -d dlqrevive -t -c \
            "SELECT tablename FROM pg_tables WHERE schemaname='public' ORDER BY tablename;")

          echo "--- Tables found ---"
          echo "$tables"

          for table in audit_trail redrive_log transform_templates; do
            if echo "$tables" | grep -q "$table"; then
              echo "✅ Table $table exists"
            else
              echo "❌ FAILED: Table $table is MISSING — schema.sql not loaded!"
              exit 1
            fi
          done

      - name: Verify PostgreSQL indexes exist
        run: |
          indexes=$(docker exec dlq-postgres psql -U dlqrevive -d dlqrevive -t -c \
            "SELECT indexname FROM pg_indexes WHERE schemaname='public' ORDER BY indexname;")

          echo "--- Indexes found ---"
          echo "$indexes"

          for idx in idx_redrive_log_lookup idx_audit_trail_user idx_audit_trail_topic; do
            if echo "$indexes" | grep -q "$idx"; then
              echo "✅ Index $idx exists"
            else
              echo "⚠️ WARNING: Index $idx is missing — queries may be slow"
            fi
          done

      - name: Verify UNIQUE constraint on redrive_log
        run: |
          # The UNIQUE constraint on (topic, partition, offset) is the FINAL safety net
          # for idempotent redrives. If it's missing → double-redrives → double-charged customers.
          constraint=$(docker exec dlq-postgres psql -U dlqrevive -d dlqrevive -t -c \
            "SELECT constraint_name FROM information_schema.table_constraints
             WHERE table_name='redrive_log' AND constraint_type='UNIQUE';")

          if [ -n "$(echo "$constraint" | xargs)" ]; then
            echo "✅ UNIQUE constraint exists on redrive_log: $(echo $constraint | xargs)"
          else
            echo "❌ CRITICAL: UNIQUE constraint MISSING on redrive_log!"
            echo "   This means double-redrives are possible → duplicate payments"
            exit 1
          fi

      - name: Teardown
        if: always()
        run: docker compose -f docker/docker-compose.yml down -v

  # ===================================================================
  # JOB 3: Security Regression Checks
  # ===================================================================
  # Catches: Someone adding Groovy/ScriptEngine → instant RCE vulnerability,
  #          hardcoded credentials committed to repo, unsafe eval() usage
  #
  # Blueprint v2 Fix 1: "Drop Groovy. Use JSONata Only."
  # These checks prevent accidental reintroduction of unsafe dependencies
  # in future PRs.
  # ===================================================================
  security:
    name: Security Regression Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: No Groovy dependency (RCE prevention — CRITICAL)
        run: |
          # Blueprint v2 Fix 1: JSONata ONLY for transformations
          # Groovy execution = Remote Code Execution as a feature
          # A user could write: Runtime.getRuntime().exec("rm -rf /")
          if grep -qi "groovy" backend/pom.xml; then
            echo "❌ BLOCKED: Groovy dependency detected in pom.xml"
            echo "   This is a CRITICAL RCE vulnerability."
            echo "   DLQ Revive uses JSONata ONLY for transformations."
            echo "   Remove the Groovy dependency immediately."
            exit 1
          fi
          echo "✅ No Groovy dependency — RCE surface is clean"

      - name: No ScriptEngine / eval() usage
        run: |
          # javax.script.ScriptEngine enables arbitrary code execution
          # JavaScript eval() enables XSS and code injection
          if grep -rn "ScriptEngine\|javax\.script\|\.eval(" backend/src/ --include="*.java"; then
            echo "❌ BLOCKED: Unsafe script execution detected in source code"
            echo "   DLQ Revive uses JSONata ONLY. No ScriptEngine, no eval()."
            exit 1
          fi
          echo "✅ No ScriptEngine or eval() usage found"

      - name: No subscribe() in view mode
        run: |
          # Blueprint v2 Fix 5: View mode uses assign() + seek() ONLY
          # subscribe() joins consumer group, steals partitions from production consumers
          if grep -rn "\.subscribe(" backend/src/main/ --include="*.java"; then
            echo "❌ BLOCKED: subscribe() found in main source code"
            echo "   View mode MUST use assign() + seek() only."
            echo "   subscribe() joins consumer groups and interferes with production."
            exit 1
          fi
          echo "✅ No subscribe() in main source — assign()+seek() only"

      - name: No commitSync/commitAsync in view mode
        run: |
          # View mode should NEVER commit offsets — it's read-only browsing
          if grep -rn "commitSync\|commitAsync" backend/src/main/ --include="*.java"; then
            echo "⚠️ WARNING: commitSync/commitAsync found in main source"
            echo "   Verify this is ONLY in redrive mode, NEVER in view/browse mode."
            # Don't fail — redrive mode may legitimately commit. Manual review needed.
          else
            echo "✅ No offset commits in main source — view mode is read-only"
          fi

      - name: No hardcoded credentials in config
        run: |
          # All credentials must use environment variables, not hardcoded values
          # The only allowed pattern is ${VAR_NAME:default} in application.yml
          if grep -rn "password.*=.*['\"]" backend/src/main/resources/ --include="*.properties" 2>/dev/null; then
            echo "❌ BLOCKED: Hardcoded password found in properties file"
            exit 1
          fi
          echo "✅ No hardcoded credentials — all secrets via environment variables"

      - name: .env files are git-ignored
        run: |
          if grep -q "\.env" .gitignore 2>/dev/null; then
            echo "✅ .env files are in .gitignore"
          else
            echo "⚠️ WARNING: .env is not in .gitignore — credentials may leak"
          fi
