server:
  port: 8080

spring:
  application:
    name: dlq-revive
  datasource:
    url: jdbc:postgresql://localhost:5432/dlqrevive
    username: ${DB_USERNAME:dlqrevive}
    password: ${DB_PASSWORD:dlqrevive}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    com.dlqrevive: INFO
    org.apache.kafka: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
