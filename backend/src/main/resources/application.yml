server:
  port: 8080

spring:
  application:
    name: dlq-revive
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/dlqrevive}
    username: ${DB_USERNAME:dlqrevive}
    password: ${DB_PASSWORD:dlqrevive}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

logging:
  level:
    com.dlqrevive: INFO
    org.apache.kafka: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
