name: dlq-revive

services:
  # --- Infrastructure ---
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: dlq-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - dlq-network
    mem_limit: 512m
    healthcheck:
      test: [ "CMD", "nc", "-z", "localhost", "2181" ]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: dlq-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - dlq-network
    mem_limit: 1g
    healthcheck:
      test: [ "CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092" ]
      interval: 15s
      timeout: 10s
      retries: 8

  postgres:
    image: postgres:15-alpine
    container_name: dlq-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dlqrevive}
      POSTGRES_USER: ${POSTGRES_USER:-dlqrevive}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dlqrevive}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    networks:
      - dlq-network
    mem_limit: 512m
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dlqrevive}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Application Services ---
  backend:
    build:
      context: ./backend
    container_name: dlq-backend
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-dlqrevive}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-dlqrevive}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-dlqrevive}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    networks:
      - dlq-network

  frontend:
    build:
      context: ./frontend
    container_name: dlq-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "4200:80"
    networks:
      - dlq-network
networks:
  dlq-network:
    driver: bridge

volumes:
  postgres-data:
